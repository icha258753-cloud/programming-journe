<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div.gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
        }

        div.gallery-item {
            margin: 5px;
            border: 1px solid #ccc;
            width: 180px;
        }

        div.gallery-item:hover {
            border: 1px solid #777;
        }

        div.gallery-item img {
            width: 100%;
            height: auto;
        }

        div.gallery-item div.desc {
            padding: 15px;
            text-align: center;
        }
    </style>

</head>

<body>

<h2>Image Gallery</h2>

<div class="gallery">

    <div class="gallery-item">
        <a target="_blank" href="cinque Terre.jpeg">
            <img src="cinque Terre.jpeg" alt="Cinque Terre" width="600" height="400">
        </a>
        <div class="desc">Cinque Terre</div>
    </div>

    <div class="gallery-item">
        <a target="_blank" href="Green Forest.jpeg">
            <img src="Green Forest.jpeg" alt="Forest" width="600" height="400">
        </a>
        <div class="desc">Green Forest</div>
    </div>

    <div class="gallery-item">
        <a target="_blank" href="Northem Lights.jpeg">
            <img src="Northem Lights.jpeg" alt="Northern Lights" width="600" height="400">
        </a>
        <div class="desc">Northern Lights</div>
    </div>

    <div class="gallery-item">
        <a target="_blank" href="mountains.jpeg">
            <img src="mountains.jpeg" alt="Mountains" width="600" height="400">
        </a>
        <div class="desc">Mountains</div>
    </div>

</div>

</body>
</html>
