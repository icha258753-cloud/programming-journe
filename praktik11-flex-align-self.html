<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box flex align-self</title>

    <style>
        .container{
            width: 600px;
            height: 200px;
            border: 5px solid blue;
            margin: 30px;
            padding: 5px;
            display: flex;
            align-items: flex-start;
        }

        .container div{
            margin: 2px;
            flex: 1;
            color: white;
            text-align: center;
            line-height: 50px;
        }

        .satu{
            background-color: red;
            align-self: flex-start;
        }

        .dua{
            background-color: green;
            align-self: flex-end;
        }

        .tiga{
            background-color: orange;
            align-self: center;
        }

        .empat{
            background-color: purple;
            align-self: stretch;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="satu">flex-start</div>
        <div class="dua">flex-end</div>
        <div class="tiga">center</div>
        <div class="empat">stretch</div>
    </div>
</body>
</html>
